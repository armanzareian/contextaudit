name: ContextAudit reusable scan

on:
  workflow_call:
    inputs:
      context_path:
        description: Path to the context pack in the caller repository.
        required: true
        type: string
      context_format:
        description: Context input format accepted by the ContextAudit CLI.
        required: false
        default: jsonl
        type: string
      policy_path:
        description: Optional policy file path in the caller repository.
        required: false
        default: ""
        type: string
      fail_on:
        description: Lowest severity that should fail the job.
        required: false
        default: high
        type: string
      output_format:
        description: Report format for the scan step.
        required: false
        default: markdown
        type: string

permissions:
  contents: read

jobs:
  contextaudit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ContextAudit
        run: python -m pip install "contextaudit @ git+https://github.com/armanzareian/contextaudit.git"

      - name: Run context scan
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ inputs.output_format }}" == "markdown" ]]; then
            if [[ -n "${{ inputs.policy_path }}" ]]; then
              contextaudit scan \
                --context "${{ inputs.context_path }}" \
                --context-format "${{ inputs.context_format }}" \
                --policy "${{ inputs.policy_path }}" \
                --format "${{ inputs.output_format }}" \
                --fail-on "${{ inputs.fail_on }}" >> "$GITHUB_STEP_SUMMARY"
            else
              contextaudit scan \
                --context "${{ inputs.context_path }}" \
                --context-format "${{ inputs.context_format }}" \
                --format "${{ inputs.output_format }}" \
                --fail-on "${{ inputs.fail_on }}" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            if [[ -n "${{ inputs.policy_path }}" ]]; then
              contextaudit scan \
                --context "${{ inputs.context_path }}" \
                --context-format "${{ inputs.context_format }}" \
                --policy "${{ inputs.policy_path }}" \
                --format "${{ inputs.output_format }}" \
                --fail-on "${{ inputs.fail_on }}"
            else
              contextaudit scan \
                --context "${{ inputs.context_path }}" \
                --context-format "${{ inputs.context_format }}" \
                --format "${{ inputs.output_format }}" \
                --fail-on "${{ inputs.fail_on }}"
            fi
          fi

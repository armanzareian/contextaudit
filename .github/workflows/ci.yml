name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run tests
        run: make test

      - name: Run quality checks
        run: make quality

      - name: Run demo scan
        run: make demo

      - name: Run answer audit demo
        run: make answer-demo

      - name: Run adapter demos
        run: make adapter-demo

      - name: Run SARIF demo
        run: make sarif-demo

      - name: Run Markdown summary demo
        run: make summary-demo

      - name: Run CI policy fixture demo
        run: make ci-policy-demo

      - name: Run labeled evaluation
        run: make eval
